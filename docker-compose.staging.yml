services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vypusknyk_plus_staging
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d vypusknyk_plus_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_staging_data:/data
    ports:
      - "9002:9000"   # S3 API
      - "9003:9001"   # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  api:
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}/vypusknyk-plus:staging
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=vypusknyk_plus_staging;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: VypusknykPlusApi
      Jwt__Audience: VypusknykPlusClient
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUser: ${EMAIL_SMTP_USER:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__FromEmail: ${EMAIL_FROM_EMAIL:-}
      Email__FromName: "Випускник+ (Staging)"
      Email__FrontendUrl: ${FRONTEND_URL:-http://localhost:5174}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__BucketName: ${MINIO_BUCKET:-products}
      Minio__PublicEndpoint: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9002}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:5174}
      Cors__AllowedOrigins__1: ${ADMIN_URL:-http://localhost:5175}
      Admin__Email: ${ADMIN_EMAIL:-}
      Admin__Password: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_staging_data:
  minio_staging_data:
