services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vypusknyk_plus
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d vypusknyk_plus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API / public image serving
      - "9001:9001"   # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/vypusknyk-plus:${API_TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=vypusknyk_plus;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: VypusknykPlusApi
      Jwt__Audience: VypusknykPlusClient
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUser: ${EMAIL_SMTP_USER:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__FromEmail: ${EMAIL_FROM_EMAIL:-}
      Email__FromName: "Випускник+"
      Email__FrontendUrl: ${FRONTEND_URL:-http://localhost:5173}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__BucketName: ${MINIO_BUCKET:-products}
      Minio__PublicEndpoint: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:5173}
      Cors__AllowedOrigins__1: ${ADMIN_URL:-http://localhost:5174}
      Admin__Email: ${ADMIN_EMAIL:-}
      Admin__Password: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
