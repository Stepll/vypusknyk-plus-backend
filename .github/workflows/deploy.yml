name: Deploy

on:
  push:
    branches: [main, staging]

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vypusknyk-plus

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & test
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test --no-build --configuration Release --verbosity normal

  # ── 2. Build & Push Docker image ─────────────────────────────────────────────
  docker:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=staging" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}

  # ── 3. Deploy to server ───────────────────────────────────────────────────────
  # Server setup (one-time, manual):
  #   mkdir -p ~/vypusknyk-plus/prod ~/vypusknyk-plus/staging
  #   # Copy .env files with secrets to each directory (see .env.example)
  #   # prod uses docker-compose.yml, staging uses docker-compose.staging.yml
  deploy:
    name: Deploy (${{ github.ref_name == 'main' && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    needs: docker
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}       # YOUR_SERVER_IP
          username: ${{ secrets.SERVER_USER }}   # e.g. ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ${{ github.ref_name == 'main' && 'docker-compose.yml' || 'docker-compose.staging.yml' }}
          target: ~/vypusknyk-plus/${{ github.ref_name == 'main' && 'prod' || 'staging' }}/

      - name: Pull image & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/vypusknyk-plus/${{ github.ref_name == 'main' && 'prod' || 'staging' }}

            COMPOSE_FILE=${{ github.ref_name == 'main' && 'docker-compose.yml' || 'docker-compose.staging.yml' }}

            # Pull new image and restart only the api container (db & minio stay up)
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f $COMPOSE_FILE pull api

            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f $COMPOSE_FILE up -d --no-deps api
