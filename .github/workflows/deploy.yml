name: Deploy

on:
  push:
    branches: [main, staging]

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vypusknyk-plus
  REPO: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & test
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test --no-build --configuration Release --verbosity normal

  # ── 2. Build & Push Docker image ─────────────────────────────────────────────
  docker:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=staging" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}

  # ── 3. Deploy to server ───────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.ref_name == 'main' && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    needs: docker
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            if [ "${{ github.ref_name }}" = "main" ]; then
              DIR=~/vypusknyk-plus/prod
              COMPOSE_FILE=docker-compose.yml
            else
              DIR=~/vypusknyk-plus/staging
              COMPOSE_FILE=docker-compose.staging.yml
            fi

            mkdir -p $DIR
            cd $DIR

            # Pull latest compose file from GitHub
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/${COMPOSE_FILE}" -o $COMPOSE_FILE

            # Pull new image and restart only api (db & minio stay up)
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f $COMPOSE_FILE pull api

            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f $COMPOSE_FILE up -d --no-deps api
